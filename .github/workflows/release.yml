name: Release

on:
  push:
    branches:
      - main

jobs:
  propose:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Install dependencies
        run: uv sync
      - name: Prepare Release Proposal
        id: prepare
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Calculate next version and update files locally
          # We disable GITHUB_OUTPUT to prevent the tool from trying to set
          # outputs (like commit_sha) that don't exist in --no-push mode.
          GITHUB_OUTPUT=false uv run semantic-release -vv version --no-push --no-tag --vcs-release=false

          # Detect if version changed by comparing pyproject.toml with HEAD
          NEW_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          OLD_VERSION=$(git show HEAD:pyproject.toml | python3 -c "import tomllib; import sys; print(tomllib.loads(sys.stdin.read().encode())['project']['version'])")

          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release PR
        if: steps.prepare.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/release-v${{ steps.prepare.outputs.version }}
          title: "chore: release v${{ steps.prepare.outputs.version }}"
          body: |
            This PR was automatically generated to propose the next release.

            **Release Version**: v${{ steps.prepare.outputs.version }}

            Review the changes to `pyproject.toml` and `CHANGELOG.md`.
            Merging this PR will trigger the final automated publishing to GitHub and PyPI.
          commit-message: "chore: release v${{ steps.prepare.outputs.version }}"
          labels: release

  publish:
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Install dependencies
        run: uv sync
      - name: Publish Release
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Create the tag for the current version
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

          # Publish (which picks up the tag)
          uv run semantic-release publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
